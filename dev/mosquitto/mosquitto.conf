# Mosquitto config — DEVELOPMENT ONLY.
# Anonymous + unencrypted. Do not use this in production.
# Production deployment uses TLS + user/password ACLs (see docs/threat-model.md).

listener 1883
protocol mqtt
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
