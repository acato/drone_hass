<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Inter, -apple-system, sans-serif" font-size="11">
  <defs>
    <style>
      .box { rx: 6; ry: 6; stroke-width: 1.5; }
      .pwr { fill: #fff3e0; stroke: #e65100; }
      .rail { fill: #e3f2fd; stroke: #1565c0; }
      .charge { fill: #e8f5e9; stroke: #2e7d32; }
      .lbl { font-weight: 600; font-size: 10px; text-anchor: middle; }
      .slbl { font-size: 9px; fill: #616161; text-anchor: middle; }
      .ed { fill: none; stroke: #757575; stroke-width: 1.5; marker-end: url(#pa); }
      .ed-lbl { font-size: 8px; fill: #424242; }
      .title { font-weight: 700; font-size: 13px; fill: #212121; }
    </style>
    <marker id="pa" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#757575"/></marker>
  </defs>

  <text x="300" y="20" text-anchor="middle" class="title">Dock Power Architecture</text>

  <!-- Mains -->
  <rect class="box pwr" x="10" y="50" width="100" height="36"/>
  <text x="60" y="67" class="lbl" fill="#e65100">Mains</text>
  <text x="60" y="80" class="slbl">From shed</text>

  <!-- UPS -->
  <rect class="box pwr" x="140" y="50" width="80" height="36"/>
  <text x="180" y="67" class="lbl" fill="#e65100">UPS</text>
  <text x="180" y="80" class="slbl">Brownout prot.</text>

  <!-- DC Supply -->
  <rect class="box pwr" x="250" y="50" width="100" height="36"/>
  <text x="300" y="67" class="lbl" fill="#e65100">12/24V DC</text>
  <text x="300" y="80" class="slbl">Supply</text>

  <!-- Rails -->
  <rect class="box rail" x="390" y="30" width="180" height="30"/>
  <text x="480" y="50" class="lbl" fill="#1565c0">Actuator Rail (fused)</text>

  <rect class="box rail" x="390" y="66" width="180" height="30"/>
  <text x="480" y="86" class="lbl" fill="#1565c0">Compute/Sensor Rail (fused)</text>

  <rect class="box rail" x="390" y="102" width="180" height="30"/>
  <text x="480" y="122" class="lbl" fill="#1565c0">Heater/Fan Rail (fused)</text>

  <!-- Arrows: Mains -> UPS -> DC -> Rails -->
  <line x1="110" y1="68" x2="138" y2="68" class="ed"/>
  <line x1="220" y1="68" x2="248" y2="68" class="ed"/>
  <line x1="350" y1="56" x2="388" y2="45" class="ed"/>
  <line x1="350" y1="68" x2="388" y2="81" class="ed"/>
  <line x1="350" y1="78" x2="388" y2="112" class="ed"/>

  <!-- Separate charger path -->
  <rect class="box charge" x="10" y="150" width="120" height="30"/>
  <text x="70" y="170" class="lbl" fill="#2e7d32">Smart Outlet</text>

  <rect class="box charge" x="170" y="150" width="130" height="30"/>
  <text x="235" y="170" class="lbl" fill="#2e7d32">Battery Charger</text>

  <rect class="box charge" x="340" y="150" width="100" height="30"/>
  <text x="390" y="170" class="lbl" fill="#2e7d32">Battery</text>

  <line x1="130" y1="165" x2="168" y2="165" class="ed"/>
  <line x1="300" y1="165" x2="338" y2="165" class="ed"/>

  <text x="170" y="192" class="slbl">HA controls the outlet; never modify OEM charging electronics</text>
</svg>